<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Specific styles just for the contact form */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }
        .contact-info, .contact-form {
            flex: 1;
            min-width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        .form-group textarea {
            resize: vertical;
            height: 120px;
        }
        button[type="submit"] {
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    

    <main class="container">
        <section class="section">
            
            
            <div class="contact-container">
                <h2>Form đăng ký tham dự đang được cập nhật...</h2>
            </div>
        </section>
    </main>

    

</body>
</html>
